name: regardsviewer # you probably want to 'snapcraft register <name>'
title: RegardsViewer 2.0
contact: appt.jf@outlook.fr
issues:
donation: https://fr.tipeee.com/regardsviewer
website: https://regardsviewerlite.tiiny.site
base: core22 # the base snap is the execution environment for this snap
version: '2.85.3.6' # just for humans, typically '1.2+git' or '1.3.2'
summary: Regards is a modern photo viewer. # 79 char long summary
description: Regards is a modern photo viewer with highDPI definition screen Support Picture format reading and writing
grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots
license: GPL-3.0
# this line enables LZO compression for the snap
compression: lzo

plugs:
    desktop:
        mount-host-font-cache: true
    gtk-3-themes:
        interface: content
        target: $SNAP/data-dir/themes
        default-provider: gtk-common-themes
    icon-themes:
        interface: content
        target: $SNAP/data-dir/icons
        default-provider: gtk-common-themes
    sound-themes:
        interface: content
        target: $SNAP/data-dir/sounds
        default-provider: gtk-common-themes
    gnome-44-2204:
        interface: content
        target: $SNAP/gnome-platform
        default-provider: gnome-44-2204

layout:
    /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libgweather-4:
        symlink: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libgweather-4
    /usr/lib/evolution-data-server:
        symlink: $SNAP/usr/lib/evolution-data-server
    /usr/bin/gnome-control-center:
        symlink: $SNAP/usr/bin/gnome-control-center
    /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
        bind: $SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1
    /usr/share/xml/iso-codes:
        bind: $SNAP/gnome-platform/usr/share/xml/iso-codes
    /usr/share/libdrm:
        bind: $SNAP/gnome-platform/usr/share/libdrm
   
 
environment:
  SNAP_DESKTOP_RUNTIME: $SNAP/gnome-platform
  GTK_USE_PORTAL: '1'
  LD_LIBRARY_PATH: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET:$SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/dri:$SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/dri:$LD_LIBRARY_PATH
  LIBGL_DRIVERS_PATH: $SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/dri
  MESA_LOADER_DRIVER_PATH: $SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/dri
  __EGL_VENDOR_LIBRARY_DIRS: $SNAP/gnome-platform/usr/share/glvnd/egl_vendor.d:$SNAP/usr/share/glvnd/egl_vendor.d
  EGL_DRIVERS_PATH: $SNAP/gnome-platform/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/egl
  EGL_PLATFORM: wayland
  MESA_LOG_LEVEL: debug
  XKB_CONFIG_DATA: $SNAP/usr/share/X11/xkb
  GTK_EXE_PREFIX: $SNAP/usr

parts:
  regardsviewer:
    plugin: dump
    source: RegardsViewer_2.85.3.0-linux-x86_64.tar.gz
    stage-packages:
      - libdrm2
      - libglu1-mesa
      - libgnutls30
      - libsdl2-2.0-0
      - libslang2
      - libsnappy1v5
      - libssh-gcrypt-4
      - libusb-1.0-0
      - libv4l-0
      - libv4l2rds0
      - libva-drm2
      - libva-glx2
      - libva-wayland2
      - libx11-6
      - libxau6
      - libxcb-shape0
      - libxcb-shm0
      - libxcb-xfixes0
      - libxcb1
      - libxdmcp6
      - libxext6
      - libxml2
      - libwebkit2gtk-4.1-0
      - libxv1
      - libzmq5
      - ocl-icd-libopencl1
      - libice6
      - libsm6
      - libepoxy0
      - curl
      - libatk1.0-0
      - libsane
      - libnotify4
      - libglvnd0
      - libglvnd-dev

apps:
  regardsviewer:
    command: usr/bin/RegardsViewer
    desktop: usr/share/applications/RegardsViewer.desktop
    extensions: [gnome]
    plugs: [process-control, x11, audio-playback, hardware-observe, opengl, alsa, mount-observe, removable-media, dvb, pulseaudio, wayland, network, home, desktop, desktop-legacy]
